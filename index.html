<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VIN Photo Capture</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #111827;
            color: #d1d5db;
            min-height: 100vh;
            touch-action: manipulation;
        }
        .container {
            max-width: 100vw;
            overflow-x: hidden;
            padding: 1rem;
        }
        .header {
            background: #1f2937;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -1rem -1rem 1rem -1rem;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        .control-panel {
            background-color: #1f2937;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
        }
        #camera-view {
            position: relative;
            background-color: #000;
            border-radius: 0.75rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1rem;
        }
        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .scan-overlay {
            width: 80%;
            height: 30%;
            border: 2px solid white;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { border-color: rgba(255, 255, 255, 0.4); }
            50% { border-color: rgba(255, 255, 255, 0.8); }
            100% { border-color: rgba(255, 255, 255, 0.4); }
        }
        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            color: white;
            transition: background-color 0.2s;
        }
        .action-button:hover {
            opacity: 0.8;
        }
        .log-panel {
            background-color: #1f2937;
            padding: 1rem;
            border-radius: 0.75rem;
            font-family: 'Courier New', Courier, monospace;
            height: 120px;
            overflow-y: auto;
            margin-top: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log {
            font-size: 0.875rem;
            color: #9ca3af;
        }
        .log.info { color: #3b82f6; }
        .log.success { color: #10b981; }
        .log.error { color: #ef4444; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #1f2937;
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            max-width: 90%;
            width: 400px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-300">
    <div class="container">
        <div class="header">
            <h1 class="text-xl font-bold">VIN Photo System</h1>
            <div id="status-indicator" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
        </div>

        <!-- Main Content Panel -->
        <div class="control-panel">
            <h2 class="text-lg font-semibold mb-2 text-white">Input VIN</h2>
            <div class="flex flex-col md:flex-row gap-2">
                <input type="text" id="vin-input" placeholder="Enter full VIN string" class="flex-grow p-2 rounded-lg bg-gray-800 text-white border border-gray-700 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="scan-btn" class="action-button bg-blue-600 hover:bg-blue-700 px-4 py-2">Scan VIN</button>
                <button id="process-btn" class="action-button bg-green-600 hover:bg-green-700 px-4 py-2">Process</button>
            </div>
            <div id="status-message" class="mt-2 text-sm text-center text-gray-400 hidden"></div>
        </div>
        
        <!-- Photo Capture Section -->
        <div id="photo-section" class="control-panel hidden">
            <h2 class="text-lg font-semibold mb-2 text-white">Required Photos</h2>
            <div class="flex flex-col gap-2" id="parts-list">
                <!-- Buttons for each part will be generated here -->
            </div>
            <div id="capture-status" class="mt-4 text-center text-sm font-medium"></div>
        </div>

        <!-- QR Scanner/Camera View -->
        <div id="camera-section" class="control-panel hidden">
            <div id="camera-view">
                <video id="camera-feed" class="w-full h-full"></video>
                <div class="overlay-container">
                    <div id="scan-area" class="scan-overlay"></div>
                </div>
            </div>
            <div class="flex justify-center mt-4">
                <button id="camera-close-btn" class="action-button bg-gray-600 hover:bg-gray-700 px-4 py-2">Close Camera</button>
            </div>
        </div>

        <!-- Log Panel -->
        <div class="log-panel">
            <div id="log-content"></div>
        </div>

        <!-- Message Modal -->
        <div id="message-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title" class="text-xl font-bold mb-2 text-white"></h3>
                <p id="modal-message" class="text-gray-400"></p>
                <button id="modal-close-btn" class="mt-4 action-button bg-blue-600 hover:bg-blue-700 w-full">OK</button>
            </div>
        </div>

    </div>

    <script type="module">
        import Dexie from 'https://cdn.jsdelivr.net/npm/dexie@3.2.3/dist/dexie.mjs';
        import QrScanner from 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js';

        const partData = {
            "BDUALBAN17EKAD-LG5": ["Manual", "Wheel cover", "Wheel cap", "Tool kit", "Warning triangle", "Tow hook"],
            "CREARJU1BCGECAF-BB": ["Manual", "Tool kit", "Warning triangle", "Tow hook"],
            "BRCARJFXBCGEBAEBBA": ["Manual", "Wheel cover", "Wheel cap", "Tool kit"],
            "FRSARBFDDOEIAE----": ["Manual", "Tool kit"],
            "FDYALFZDDOTJA--CAD": ["Manual", "Tool kit", "Warning triangle", "Tow hook"],
            "FDYALHZDD0TJAB-CAD": ["Manual", "Tow hook"],
            "FRSARDFDDOEIAF----": ["Manual", "Tow hook"]
        };

        const vinInput = document.getElementById('vin-input');
        const scanBtn = document.getElementById('scan-btn');
        const processBtn = document.getElementById('process-btn');
        const statusIndicator = document.getElementById('status-indicator');
        const statusMessage = document.getElementById('status-message');
        const cameraSection = document.getElementById('camera-section');
        const cameraFeed = document.getElementById('camera-feed');
        const cameraCloseBtn = document.getElementById('camera-close-btn');
        const photoSection = document.getElementById('photo-section');
        const partsList = document.getElementById('parts-list');
        const captureStatus = document.getElementById('capture-status');
        const logContent = document.getElementById('log-content');
        const messageModal = document.getElementById('message-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalCloseBtn = document.getElementById('modal-close-btn');

        let qrScanner = null;
        let stream = null;
        let currentVIN = null;
        let requiredParts = [];
        let takenPhotos = [];
        let isCapturing = false;

        const db = new Dexie('VinPhotoDB');
        db.version(1).stores({
            photos: '++id, vin, partName, timestamp'
        });

        // Display a modal message to the user
        function showModal(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            messageModal.classList.remove('hidden');
        }

        // Add a log message to the console-like panel
        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log ${type}`;
            logEntry.textContent = `> ${message}`;
            logContent.prepend(logEntry);
        }

        // Process the full string to extract the end item
        function getEndItem(fullString) {
            try {
                // Per user instruction: leave out the first 20 characters and take the next 18
                if (fullString && fullString.length >= 38) {
                    const endItem = fullString.substring(20, 38).trim();
                    addLog(`Extracted end item: ${endItem}`, 'success');
                    return endItem;
                } else {
                    addLog('Invalid string format. Unable to extract end item.', 'error');
                    showModal('Error', 'The provided string is too short to extract the end item.');
                    return null;
                }
            } catch (e) {
                addLog('An error occurred during end item extraction.', 'error');
                showModal('Error', 'An unexpected error occurred. Please check the input string format.');
                return null;
            }
        }
        
        // Get the list of required parts for a given end item
        function getRequiredParts(endItem) {
            const parts = partData[endItem];
            if (parts) {
                addLog(`Found ${parts.length} required parts for end item ${endItem}.`, 'info');
                return parts;
            } else {
                addLog(`No part data found for end item: ${endItem}.`, 'error');
                showModal('Data Error', `The end item "${endItem}" was not found in the database. Please check the data.`);
                return [];
            }
        }

        // Render the list of buttons for each required photo
        function renderRequiredParts() {
            partsList.innerHTML = '';
            if (requiredParts.length > 0) {
                photoSection.classList.remove('hidden');
                requiredParts.forEach(partName => {
                    const button = document.createElement('button');
                    button.textContent = `Take Photo for ${partName}`;
                    button.className = 'action-button bg-gray-700 hover:bg-gray-600';
                    button.dataset.part = partName;
                    button.addEventListener('click', () => startPhotoCapture(partName));
                    partsList.appendChild(button);
                });
                updateCaptureStatus();
            } else {
                photoSection.classList.add('hidden');
            }
        }

        // Update the capture progress message
        function updateCaptureStatus() {
            const capturedCount = takenPhotos.length;
            const totalCount = requiredParts.length;
            if (totalCount > 0) {
                captureStatus.textContent = `Captured: ${capturedCount} / ${totalCount}`;
                if (capturedCount === totalCount) {
                    captureStatus.textContent = 'All photos captured successfully!';
                    captureStatus.classList.remove('text-gray-400', 'text-blue-500');
                    captureStatus.classList.add('text-green-500');
                } else {
                    captureStatus.classList.remove('text-green-500', 'text-gray-400');
                    captureStatus.classList.add('text-blue-500');
                }
            }
        }
        
        // Start the camera and capture a photo for a specific part
        async function startPhotoCapture(partName) {
            if (isCapturing) {
                addLog('Already in photo capture mode.', 'info');
                return;
            }
            isCapturing = true;
            try {
                // Use the native camera input
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.setAttribute('capture', 'environment'); // Use back camera
                fileInput.style.display = 'none';

                fileInput.onchange = async (event) => {
                    const file = event.target.files[0];
                    if (file) {
                        await savePhoto(file, partName);
                    }
                    isCapturing = false;
                    document.body.removeChild(fileInput);
                };
                
                document.body.appendChild(fileInput);
                fileInput.click();
            } catch (err) {
                addLog('Failed to access native camera. Error: ' + err.message, 'error');
                showModal('Camera Error', 'Could not access the camera. Please check permissions.');
                isCapturing = false;
            }
        }

        // Save the captured photo data to IndexedDB
        async function savePhoto(photoFile, partName) {
            const reader = new FileReader();
            reader.onload = async () => {
                const photoData = reader.result;
                try {
                    await db.photos.add({
                        vin: currentVIN,
                        partName: partName,
                        photo: photoData,
                        timestamp: new Date()
                    });
                    takenPhotos.push(partName);
                    addLog(`Photo for '${partName}' saved successfully!`, 'success');
                    updateCaptureStatus();
                    // Disable the button for the captured part
                    const button = document.querySelector(`button[data-part="${partName}"]`);
                    if (button) {
                        button.disabled = true;
                        button.classList.add('opacity-50', 'cursor-not-allowed', 'bg-green-700', 'hover:bg-green-700');
                        button.textContent = `Photo for ${partName} Taken`;
                    }
                } catch (e) {
                    addLog('Failed to save photo to database: ' + e.message, 'error');
                    showModal('Save Error', 'An error occurred while saving the photo to the database.');
                }
            };
            reader.readAsDataURL(photoFile);
        }

        // Stop the camera stream and clean up
        function stopCamera() {
            if (qrScanner) {
                qrScanner.stop();
                qrScanner.destroy();
                qrScanner = null;
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraSection.classList.add('hidden');
            statusIndicator.classList.remove('bg-green-500');
            statusIndicator.classList.add('bg-red-500');
        }

        // Handle the QR code scan result
        function handleScanResult(result) {
            stopCamera();
            const fullString = result.data;
            vinInput.value = fullString;
            processVinString(fullString);
        }
        
        // Main function to process the VIN string
        function processVinString(fullString) {
            // Reset state for a new scan
            takenPhotos = [];
            partsList.innerHTML = '';
            captureStatus.textContent = '';
            currentVIN = null;

            if (fullString.length === 0) {
                showModal('Input Required', 'Please enter a VIN string or use the scanner.');
                return;
            }
            
            // Extract the VIN itself (after #, length 17)
            const vinMatch = fullString.match(/#([A-Za-z0-9]{17})/);
            if (!vinMatch) {
                showModal('VIN Not Found', 'Could not find a valid 17-digit VIN after "#" in the provided string.');
                addLog('Could not find VIN in string.', 'error');
                return;
            }
            currentVIN = vinMatch[1];
            addLog(`VIN: ${currentVIN}`, 'info');

            const endItem = getEndItem(fullString);
            if (endItem) {
                requiredParts = getRequiredParts(endItem);
                renderRequiredParts();
            }
        }

        // Event listeners
        scanBtn.addEventListener('click', async () => {
            try {
                cameraSection.classList.remove('hidden');
                statusIndicator.classList.remove('bg-red-500');
                statusIndicator.classList.add('bg-green-500');
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraFeed.srcObject = stream;
                cameraFeed.play();

                qrScanner = new QrScanner(
                    cameraFeed,
                    result => handleScanResult(result),
                    {
                        highlightScanRegion: true,
                        highlightCodeOutline: true,
                        overlay: document.getElementById('scan-area'),
                    }
                );
                await qrScanner.start();
                addLog('QR Scanner started.', 'success');
            } catch (err) {
                addLog('Camera access denied or unavailable.', 'error');
                showModal('Camera Error', 'Camera access is required to scan. Please allow access.');
                cameraSection.classList.add('hidden');
                statusIndicator.classList.remove('bg-green-500');
                statusIndicator.classList.add('bg-red-500');
            }
        });

        cameraCloseBtn.addEventListener('click', stopCamera);
        
        processBtn.addEventListener('click', () => {
            processVinString(vinInput.value);
        });

        modalCloseBtn.addEventListener('click', () => {
            messageModal.classList.add('hidden');
        });

        // Initialize welcome message
        document.addEventListener('DOMContentLoaded', () => {
            addLog('VIN Photo Capture System ready.');
            addLog('Enter a VIN string or use the "Scan VIN" button.');
            // Add event listener for enter key on input
            vinInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    processBtn.click();
                }
            });
        });

    </script>
</body>
</html>
