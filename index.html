<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VIN Photo Capture - QR Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: white;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .container {
            max-width: 100vw;
            overflow-x: hidden;
            padding: 1rem;
        }

        /* Header */
        .header {
            background: #1f2937;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -1rem -1rem 1rem -1rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .settings-btn {
            background: #374151;
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Cards */
        .card {
            background: #1f2937;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #374151;
        }

        .card-header {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .card-header h2 {
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 1.125rem;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            background: #374151;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: #3b82f6;
            background: #4b5563;
        }

        /* VIN Input Section */
        .vin-input-section {
            display: flex;
            gap: 0.75rem;
            align-items: end;
        }

        .vin-input-wrapper {
            flex: 1;
        }

        .qr-scan-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            min-width: 120px;
            transition: all 0.3s;
        }

        .qr-scan-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        /* QR Scanner */
        .qr-scanner-container {
            position: relative;
            background: #000;
            border-radius: 0.75rem;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 2px solid #8b5cf6;
        }

        .qr-scanner-container.hidden {
            display: none;
        }

        #qr-video {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .qr-scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .qr-scanner-frame {
            width: 200px;
            height: 200px;
            border: 3px solid #8b5cf6;
            border-radius: 0.5rem;
            position: relative;
        }

        .qr-scanner-controls {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .qr-control-btn {
            background: rgba(139, 92, 246, 0.9);
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .qr-status {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
            font-size: 0.875rem;
            backdrop-filter: blur(10px);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            font-weight: bold;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-ghost {
            background: transparent;
            border: 2px solid #374151;
            color: #9ca3af;
        }

        .btn:disabled {
            background: #6b7280;
            color: #9ca3af;
            cursor: not-allowed;
        }

        /* Settings Row */
        .settings-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .settings-item {
            text-align: center;
        }

        .settings-item .form-input {
            padding: 0.75rem;
            font-size: 1rem;
            text-align: center;
        }

        /* Status Display */
        .status-display {
            background: #374151;
            border: 2px solid #3b82f6;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin-bottom: 1.5rem;
        }

        .status-text {
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .status-subtext {
            font-size: 0.875rem;
            color: #9ca3af;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .photo-item {
            background: #374151;
            border-radius: 0.5rem;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .photo-item-info {
            font-size: 0.75rem;
            color: #9ca3af;
            text-align: center;
        }

        .photo-item-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .photo-item-actions button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.75rem;
            margin-bottom: 0;
        }

        /* Activity Log */
        .log-container {
            background: #000;
            border-radius: 0.5rem;
            padding: 1rem;
            height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #10b981;
            border: 1px solid #374151;
        }

        .log-entry {
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        /* Hidden elements */
        .hidden {
            display: none !important;
        }

        /* File input styling */
        .camera-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Mobile optimizations */
        @media (max-width: 640px) {
            .vin-input-section {
                flex-direction: column;
                gap: 1rem;
            }

            .qr-scan-btn {
                width: 100%;
                min-width: auto;
            }

            .settings-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚗 VIN Photo System</h1>
            <button class="settings-btn" onclick="openModal('settings-modal')">⚙️</button>
        </div>

        <!-- Capture Section -->
        <div class="card-header">
            <h2>📸 Vehicle Photo System with QR Scanner</h2>
        </div>

        <div class="card">
            <!-- QR Scanner -->
            <div id="qr-scanner-container" class="qr-scanner-container hidden">
                <video id="qr-video" autoplay muted playsinline></video>
                <div class="qr-scanner-overlay">
                    <div class="qr-scanner-frame"></div>
                </div>
                <div id="qr-status" class="qr-status">Point camera at QR code</div>
                <div class="qr-scanner-controls">
                    <button class="qr-control-btn" onclick="stopQRScanner()">❌ Stop Scanner</button>
                    <button class="qr-control-btn" onclick="switchCamera()" id="switch-camera-btn">🔄 Switch Camera</button>
                </div>
            </div>

            <!-- VIN Input Section -->
            <div class="form-group">
                <label class="form-label">VIN Number:</label>
                <div class="vin-input-section">
                    <div class="vin-input-wrapper">
                        <input type="text" id="vin-input" class="form-input" placeholder="Enter VIN number or scan QR..." 
                               onkeyup="handleVinInput(event)" maxlength="17">
                    </div>
                    <button id="qr-scan-btn" class="qr-scan-btn" onclick="startQRScanner()">
                        📷 Scan QR
                    </button>
                </div>
            </div>

            <div class="settings-row">
                <div class="settings-item">
                    <label class="form-label" style="font-size: 0.875rem;">Photos Needed</label>
                    <input type="number" id="photo-count" class="form-input" min="1" max="10" value="3">
                </div>
                <div class="settings-item">
                    <label class="form-label" style="font-size: 0.875rem;">Taken</label>
                    <input type="text" id="photos-taken" class="form-input" value="0" readonly style="background: #6b7280;">
                </div>
                <div class="settings-item">
                    <label class="form-label" style="font-size: 0.875rem;">Remaining</label>
                    <input type="text" id="photos-remaining" class="form-input" value="3" readonly style="background: #6b7280;">
                </div>
            </div>

            <button id="take-photo-btn" class="btn btn-primary" onclick="startPhotoSequence()">
                📸 Start Photo Sequence
            </button>

            <button id="single-photo-btn" class="btn btn-secondary" onclick="takeSinglePhoto()">
                📷 Take Single Photo
            </button>

            <button id="load-vin-btn" class="btn btn-ghost" onclick="loadVin()">
                📁 Load Existing VIN Photos
            </button>

            <div id="status-display" class="status-display">
                <div class="status-text">Ready to capture photos</div>
                <div class="status-subtext">Enter VIN manually or scan QR code, then take photos</div>
            </div>
        </div>

        <!-- Photo Gallery -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div class="form-label" id="photo-gallery-title">📁 Photos for Current VIN</div>
            </div>

            <div id="photo-grid" class="photo-grid"></div>
            
            <div id="empty-gallery" class="status-display" style="border-color: #6b7280;">
                <div class="status-text">No photos yet</div>
                <div class="status-subtext">Take photos to see them here</div>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="card">
            <div class="form-label">📋 Activity Log</div>
            <div id="activity-log" class="log-container"></div>
        </div>

        <!-- Hidden camera inputs -->
        <input type="file" id="camera-input" class="camera-input" accept="image/*" capture="environment" multiple>
        <input type="file" id="single-camera-input" class="camera-input" accept="image/*" capture="environment">
    </div>

    <!-- QR Code Scanner Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script>
        // QR Scanner Variables
        let qrScanner = null;
        let currentCameraId = null;
        let availableCameras = [];

        // IndexedDB Database Setup
        const DB_NAME = 'VINPhotoDatabase';
        const DB_VERSION = 1;
        const STORE_NAME = 'photos';
        let db = null;

        // Global variables
        let currentVin = '';
        let photos = {};
        let settings = {
            photoQuality: 0.8,
            autoClear: false,
            autoExport: true
        };

        // Initialize IndexedDB
        async function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                
                request.onsuccess = () => {
                    db = request.result;
                    addLog('Database initialized successfully');
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('vin', 'vin', { unique: false });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                        addLog('Database schema created');
                    }
                };
            });
        }

        // Check camera permissions first
        async function checkCameraPermissions() {
            try {
                // Check if we're on HTTPS or localhost
                const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
                
                if (!isSecure) {
                    throw new Error('Camera requires HTTPS connection. Please access via HTTPS or localhost.');
                }

                // Check if browser supports getUserMedia
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Camera not supported in this browser');
                }

                // Request camera permission
                addLog('🔐 Requesting camera permission...');
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment' // Try to use back camera
                    } 
                });
                
                // Stop the stream immediately - we just wanted to check permission
                stream.getTracks().forEach(track => track.stop());
                addLog('✅ Camera permission granted');
                return true;
                
            } catch (error) {
                addLog(`❌ Camera permission error: ${error.message}`);
                return false;
            }
        }

        // QR Scanner Functions
        async function startQRScanner() {
            try {
                addLog('🔍 Starting QR scanner...');
                document.getElementById('qr-scan-btn').disabled = true;
                document.getElementById('qr-scan-btn').innerHTML = '📷 Starting...';
                
                // Check protocol and permissions first
                const hasPermission = await checkCameraPermissions();
                if (!hasPermission) {
                    throw new Error('Camera permission denied or not available');
                }
                
                document.getElementById('qr-scanner-container').classList.remove('hidden');
                document.getElementById('qr-status').textContent = 'Checking cameras...';
                
                // Get available cameras with better error handling
                let cameras;
                try {
                    cameras = await Html5Qrcode.getCameras();
                } catch (cameraError) {
                    addLog(`❌ Failed to get cameras: ${cameraError.message}`);
                    throw new Error(`Cannot access cameras: ${cameraError.message}`);
                }
                
                availableCameras = cameras || [];
                addLog(`📱 Found ${availableCameras.length} camera(s)`);
                
                if (availableCameras.length === 0) {
                    throw new Error('No cameras found on this device');
                }

                // Prefer back camera for QR scanning
                currentCameraId = availableCameras.find(camera => 
                    camera.label && (
                        camera.label.toLowerCase().includes('back') ||
                        camera.label.toLowerCase().includes('rear') ||
                        camera.label.toLowerCase().includes('environment')
                    )
                )?.id || availableCameras[availableCameras.length - 1].id;
                
                const selectedCamera = availableCameras.find(cam => cam.id === currentCameraId);
                addLog(`📷 Using camera: ${selectedCamera?.label || 'Unknown Camera'}`);
                
                // Initialize QR scanner
                qrScanner = new Html5Qrcode("qr-video");
                
                // Mobile-optimized config
                const config = {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        // Square QR box that's 70% of the smaller dimension
                        const minEdgePercentage = 0.7;
                        const minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                        const qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                        return {
                            width: qrboxSize,
                            height: qrboxSize
                        };
                    },
                    aspectRatio: 1.0,
                    disableFlip: false,
                    videoConstraints: {
                        facingMode: 'environment' // Prefer back camera
                    }
                };
                
                document.getElementById('qr-status').textContent = 'Starting camera...';
                
                await qrScanner.start(
                    currentCameraId,
                    config,
                    onQRScanSuccess,
                    onQRScanFailure
                );
                
                document.getElementById('qr-status').textContent = 'Point camera at QR code';
                addLog('✅ QR scanner started successfully');
                
                // Show switch camera button if multiple cameras available
                const switchBtn = document.getElementById('switch-camera-btn');
                if (availableCameras.length > 1) {
                    switchBtn.style.display = 'block';
                } else {
                    switchBtn.style.display = 'none';
                }
                
            } catch (error) {
                console.error('QR Scanner error:', error);
                addLog(`❌ QR scanner failed: ${error.message}`);
                
                // More specific error messages
                let errorMessage = error.message;
                if (error.message.includes('Permission denied')) {
                    errorMessage = 'Camera permission denied. Please allow camera access and try again.';
                } else if (error.message.includes('HTTPS')) {
                    errorMessage = 'Camera requires secure connection. Please use HTTPS.';
                } else if (error.message.includes('NotFoundError')) {
                    errorMessage = 'No camera found on this device.';
                } else if (error.message.includes('NotAllowedError')) {
                    errorMessage = 'Camera access blocked. Check browser permissions.';
                } else if (error.message.includes('NotReadableError')) {
                    errorMessage = 'Camera is being used by another app.';
                }
                
                document.getElementById('qr-status').textContent = `Error: ${errorMessage}`;
                
                // Show troubleshooting info
                showCameraTroubleshooting(errorMessage);
                
                stopQRScanner();
            }
        }

        function showCameraTroubleshooting(errorMessage) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;
            modal.innerHTML = `
                <div style="
                    background: #1f2937;
                    border-radius: 0.75rem;
                    padding: 1.5rem;
                    max-width: 400px;
                    color: white;
                ">
                    <div style="font-weight: bold; margin-bottom: 1rem; color: #ef4444;">📷 Camera Error</div>
                    <div style="margin-bottom: 1rem; font-size: 0.875rem;">${errorMessage}</div>
                    
                    <div style="background: #374151; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;">
                        <div style="font-weight: bold; margin-bottom: 0.5rem;">💡 Troubleshooting Tips:</div>
                        <div style="font-size: 0.75rem; line-height: 1.4;">
                            1. <strong>Allow camera permission</strong> when prompted<br>
                            2. <strong>Check browser settings</strong> - ensure camera is not blocked<br>
                            3. <strong>Close other camera apps</strong> that might be using the camera<br>
                            4. <strong>Try refreshing</strong> the page and try again<br>
                            5. <strong>Use HTTPS</strong> - camera requires secure connection<br>
                            6. <strong>Try another browser</strong> if the issue persists
                        </div>
                    </div>
                    
                    <div style="background: #059669; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.75rem;">
                        <strong>Alternative:</strong> You can still enter VIN manually using the text input field above.
                    </div>
                    
                    <div style="display: flex; gap: 0.75rem;">
                        <button onclick="this.closest('div').remove(); startQRScanner();" style="
                            flex: 1;
                            background: #3b82f6;
                            border: none;
                            color: white;
                            padding: 0.75rem;
                            border-radius: 0.5rem;
                            cursor: pointer;
                            font-size: 0.875rem;
                        ">🔄 Try Again</button>
                        <button onclick="this.closest('div').remove();" style="
                            flex: 1;
                            background: #6b7280;
                            border: none;
                            color: white;
                            padding: 0.75rem;
                            border-radius: 0.5rem;
                            cursor: pointer;
                            font-size: 0.875rem;
                        ">❌ Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Close on click outside
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        function onQRScanSuccess(decodedText, decodedResult) {
            addLog(`📷 QR code detected: ${decodedText.substring(0, 50)}...`);
            
            const vin = extractVinFromQR(decodedText);
            
            if (vin) {
                document.getElementById('vin-input').value = vin;
                currentVin = vin;
                
                addLog(`✅ VIN extracted: ${vin}`);
                document.getElementById('qr-status').textContent = `✅ VIN Found: ${vin}`;
                
                showQRSuccessNotification(vin);
                
                setTimeout(() => {
                    stopQRScanner();
                    loadVin();
                }, 1500);
                
            } else {
                addLog(`⚠️ No VIN found in QR code: ${decodedText}`);
                document.getElementById('qr-status').textContent = '⚠️ No VIN found in QR code - keep scanning';
            }
        }

        function onQRScanFailure(error) {
            // Called frequently when no QR code is detected - don't log
        }

        function extractVinFromQR(qrText) {
            try {
                addLog(`🔍 Analyzing QR text: ${qrText}`);
                
                const hashIndex = qrText.indexOf('#');
                
                if (hashIndex !== -1 && hashIndex < qrText.length - 16) {
                    const afterHash = qrText.substring(hashIndex + 1);
                    addLog(`📋 Text after #: ${afterHash}`);
                    
                    const vinMatch = afterHash.match(/^([A-Z0-9]{16})/);
                    
                    if (vinMatch) {
                        const extractedVin = vinMatch[1];
                        addLog(`🎯 Extracted VIN: ${extractedVin}`);
                        return extractedVin;
                    } else {
                        addLog(`❌ No 16-character VIN pattern found after #`);
                    }
                } else {
                    addLog(`❌ No # symbol found in QR code`);
                }
                
                return null;
                
            } catch (error) {
                console.error('Error extracting VIN:', error);
                addLog(`❌ Error extracting VIN: ${error.message}`);
                return null;
            }
        }

        async function stopQRScanner() {
            try {
                if (qrScanner) {
                    await qrScanner.stop();
                    qrScanner = null;
                    addLog('🛑 QR scanner stopped');
                }
            } catch (error) {
                console.error('Error stopping QR scanner:', error);
            } finally {
                document.getElementById('qr-scanner-container').classList.add('hidden');
                document.getElementById('qr-scan-btn').disabled = false;
                document.getElementById('qr-scan-btn').innerHTML = '📷 Scan QR';
            }
        }

        async function switchCamera() {
            if (!qrScanner || availableCameras.length <= 1) return;
            
            try {
                addLog('🔄 Switching camera...');
                document.getElementById('qr-status').textContent = 'Switching camera...';
                
                await qrScanner.stop();
                
                const currentIndex = availableCameras.findIndex(camera => camera.id === currentCameraId);
                const nextIndex = (currentIndex + 1) % availableCameras.length;
                currentCameraId = availableCameras[nextIndex].id;
                
                addLog(`📱 Switched to camera: ${availableCameras[nextIndex].label || 'Unknown'}`);
                
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0
                };
                
                await qrScanner.start(
                    currentCameraId,
                    config,
                    onQRScanSuccess,
                    onQRScanFailure
                );
                
                document.getElementById('qr-status').textContent = 'Point camera at QR code';
                
            } catch (error) {
                console.error('Error switching camera:', error);
                addLog(`❌ Failed to switch camera: ${error.message}`);
                document.getElementById('qr-status').textContent = `Error switching camera: ${error.message}`;
            }
        }

        function showQRSuccessNotification(vin) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #10b981, #059669);
                color: white;
                padding: 1rem;
                border-radius: 0.75rem;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                z-index: 1000;
                max-width: 300px;
                border: 2px solid #047857;
            `;
            notification.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 0.5rem;">📷 QR Scan Success!</div>
                <div style="font-size: 0.875rem;">VIN: ${vin}</div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 3000);
        }

        // Save photo to IndexedDB
        async function savePhotoToDB(photo) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                
                const request = store.add(photo);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // Load photos for a VIN from IndexedDB
        async function loadPhotosFromDB(vin) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const index = store.index('vin');
                
                const request = index.getAll(vin);
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        // Photo capture functions
        function startPhotoSequence() {
            const vinInput = document.getElementById('vin-input');
            const vin = vinInput.value.trim().toUpperCase();
            
            if (!vin) {
                alert('Please enter a VIN number first or scan a QR code!');
                return;
            }

            const photosNeeded = parseInt(document.getElementById('photo-count').value) || 3;
            currentVin = vin;
            
            document.getElementById('take-photo-btn').disabled = true;
            document.getElementById('take-photo-btn').innerHTML = 'Opening Camera...';
            
            updateStatus('📸 Taking photo sequence...', `Take ${photosNeeded} photos continuously`);
            addLog(`Starting photo sequence for VIN: ${vin} (${photosNeeded} photos)`);
            
            setTimeout(() => {
                document.getElementById('camera-input').click();
            }, 1000);
        }

        function takeSinglePhoto() {
            const vinInput = document.getElementById('vin-input');
            const vin = vinInput.value.trim().toUpperCase();
            
            if (!vin) {
                alert('Please enter a VIN number first or scan a QR code!');
                return;
            }

            currentVin = vin;
            updateStatus('Opening camera...', 'Take a single photo');
            
            document.getElementById('single-camera-input').click();
        }

        // Camera input handlers
        document.getElementById('camera-input').addEventListener('change', function(event) {
            const files = event.target.files;
            if (files && files.length > 0) {
                handleCapturedPhotos(files);
            }
            event.target.value = '';
        });

        document.getElementById('single-camera-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                handleSinglePhoto(file);
            }
            event.target.value = '';
        });

        function handleCapturedPhotos(files) {
            if (!currentVin) {
                alert('No VIN specified!');
                return;
            }

            document.getElementById('take-photo-btn').disabled = false;
            document.getElementById('take-photo-btn').innerHTML = '📸 Start Photo Sequence';

            if (!files || files.length === 0) {
                updateStatus('No photos captured', 'Try again');
                addLog('Photo sequence cancelled - no photos taken');
                return;
            }

            const photosNeeded = parseInt(document.getElementById('photo-count').value) || 3;
            const photosCaptured = Math.min(files.length, photosNeeded);
            
            if (!photos[currentVin]) {
                photos[currentVin] = [];
            }

            const savePromises = [];
            for (let i = 0; i < photosCaptured; i++) {
                const file = files[i];
                const photo = {
                    id: generateId(),
                    vin: currentVin,
                    timestamp: Date.now() + i,
                    photoNumber: photos[currentVin].length + 1,
                    file: file,
                    blob: file
                };

                photos[currentVin].push(photo);
                savePromises.push(savePhotoToDB(photo));
            }

            Promise.all(savePromises).then(() => {
                addLog(`✅ ${photosCaptured} photos saved to persistent storage`);
                
                updatePhotoGallery();
                updatePhotoCounters();
                
                const totalPhotos = photos[currentVin].length;
                addLog(`Captured ${photosCaptured} photos for VIN: ${currentVin}`);
                
                if (totalPhotos >= photosNeeded) {
                    updateStatus('✅ Photo sequence complete!', `All ${photosNeeded} photos captured successfully`);
                } else {
                    const remaining = photosNeeded - totalPhotos;
                    updateStatus(`📸 ${photosCaptured} photos added!`, `${remaining} more photo${remaining > 1 ? 's' : ''} needed`);
                }
            }).catch(error => {
                console.error('Failed to save photos to database:', error);
                addLog('⚠️ Failed to save photos to persistent storage');
                alert('Warning: Photos may not be saved permanently. Try again.');
            });
        }

        function handleSinglePhoto(file) {
            if (!currentVin) {
                alert('No VIN specified!');
                return;
            }

            const photo = {
                id: generateId(),
                vin: currentVin,
                timestamp: Date.now(),
                photoNumber: getCurrentPhotoNumber(),
                file: file,
                blob: file
            };

            if (!photos[currentVin]) {
                photos[currentVin] = [];
            }
            photos[currentVin].push(photo);

            savePhotoToDB(photo).then(() => {
                addLog(`✅ Photo saved to persistent storage`);
                
                updatePhotoGallery();
                updatePhotoCounters();
                
                const photosTaken = photos[currentVin].length;
                const photosNeeded = parseInt(document.getElementById('photo-count').value);
                
                addLog(`Single photo captured for VIN: ${currentVin}`);
                
                if (photosTaken >= photosNeeded) {
                    updateStatus('✅ All photos complete!', `${photosNeeded} photos captured`);
                } else {
                    const remaining = photosNeeded - photosTaken;
                    updateStatus(`📸 Photo ${photosTaken} captured!`, `${remaining} more photo${remaining > 1 ? 's' : ''} needed`);
                }
            }).catch(error => {
                console.error('Failed to save photo to database:', error);
                addLog('⚠️ Failed to save photo to persistent storage');
                alert('Warning: Photo may not be saved permanently. Try again.');
            });
        }

        function getCurrentPhotoNumber() {
            if (!photos[currentVin]) return 1;
            return photos[currentVin].length + 1;
        }

        function updatePhotoCounters() {
            const photosNeeded = parseInt(document.getElementById('photo-count').value) || 3;
            const photosTaken = currentVin && photos[currentVin] ? photos[currentVin].length : 0;
            const photosRemaining = Math.max(0, photosNeeded - photosTaken);

            document.getElementById('photos-taken').value = photosTaken;
            document.getElementById('photos-remaining').value = photosRemaining;
            document.getElementById('photo-count').addEventListener('input', updatePhotoCounters);
        }

        async function loadVin() {
            const vinInput = document.getElementById('vin-input');
            const vin = vinInput.value.trim().toUpperCase();
            
            if (!vin) {
                alert('Please enter a VIN number or scan a QR code!');
                return;
            }

            try {
                currentVin = vin;
                
                const vinPhotos = await loadPhotosFromDB(vin);
                photos[vin] = vinPhotos;
                
                updatePhotoGallery();
                updatePhotoCounters();
                
                const photoCount = vinPhotos.length;
                addLog(`Loaded VIN: ${vin} with ${photoCount} existing photos from database`);
                updateStatus(`VIN loaded: ${vin}`, `${photoCount} existing photos found`);
            } catch (error) {
                console.error('Failed to load VIN photos:', error);
                addLog(`⚠️ Failed to load photos for VIN: ${vin}`);
            }
        }

        function updatePhotoGallery() {
            const gallery = document.getElementById('photo-grid');
            const emptyGallery = document.getElementById('empty-gallery');
            const title = document.getElementById('photo-gallery-title');
            
            gallery.innerHTML = '';
            
            if (!currentVin || !photos[currentVin] || photos[currentVin].length === 0) {
                emptyGallery.classList.remove('hidden');
                title.textContent = '📁 Photos for Current VIN';
                return;
            }

            emptyGallery.classList.add('hidden');
            title.textContent = `📁 Photos for VIN: ${currentVin} (${photos[currentVin].length})`;

            photos[currentVin].forEach((photo, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                
                const img = document.createElement('img');
                img.src = URL.createObjectURL(photo.blob);
                img.alt = `Photo ${photo.photoNumber}`;
                
                const info = document.createElement('div');
                info.className = 'photo-item-info';
                info.textContent = `Photo ${photo.photoNumber} - ${new Date(photo.timestamp).toLocaleString()}`;
                
                const actions = document.createElement('div');
                actions.className = 'photo-item-actions';
                
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'btn btn-primary';
                downloadBtn.textContent = '💾';
                downloadBtn.onclick = () => downloadPhoto(photo);
                
                const viewBtn = document.createElement('button');
                viewBtn.className = 'btn btn-secondary';
                viewBtn.textContent = '👁️';
                viewBtn.onclick = () => viewPhoto(photo);
                
                actions.appendChild(downloadBtn);
                actions.appendChild(viewBtn);
                
                photoItem.appendChild(img);
                photoItem.appendChild(info);
                photoItem.appendChild(actions);
                
                gallery.appendChild(photoItem);
            });
        }

        function downloadPhoto(photo) {
            const timestamp = new Date(photo.timestamp).toISOString().slice(0, 19).replace(/:/g, '-');
            const filename = `${photo.vin}_photo_${photo.photoNumber.toString().padStart(2, '0')}_${timestamp}.jpg`;
            
            const link = document.createElement('a');
            link.download = filename;
            link.href = URL.createObjectURL(photo.blob);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            addLog(`📸 Downloaded: ${filename}`);
        }

        function viewPhoto(photo) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;
            modal.innerHTML = `
                <div style="
                    background: #1f2937;
                    border-radius: 0.75rem;
                    padding: 1.5rem;
                    max-width: 90vw;
                    max-height: 90vh;
                    overflow: auto;
                ">
                    <div style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 1rem;
                    ">
                        <div style="font-size: 1.25rem; font-weight: bold;">Photo ${photo.photoNumber} - ${photo.vin}</div>
                        <button onclick="this.closest('div').remove()" style="
                            background: none;
                            border: none;
                            color: #9ca3af;
                            font-size: 1.5rem;
                            cursor: pointer;
                            padding: 0.25rem;
                        ">&times;</button>
                    </div>
                    <img src="${URL.createObjectURL(photo.blob)}" style="width: 100%; border-radius: 0.5rem;">
                    <div style="margin-top: 1rem; font-size: 0.875rem; color: #9ca3af;">
                        <div>VIN: ${photo.vin}</div>
                        <div>Photo: ${photo.photoNumber}</div>
                        <div>Date: ${new Date(photo.timestamp).toLocaleString()}</div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Close on click outside
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Modal functions (simplified)
        function openModal(modalId) {
            // Simplified modal - just show settings
            if (modalId === 'settings-modal') {
                alert('Settings: Photo Quality: 80%, Auto-export: Yes, Auto-clear: No');
            }
        }

        // Utility functions
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function addLog(message) {
            const log = document.getElementById('activity-log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function updateStatus(main, sub = '') {
            const statusDisplay = document.getElementById('status-display');
            statusDisplay.innerHTML = `
                <div class="status-text">${main}</div>
                ${sub ? `<div class="status-subtext">${sub}</div>` : ''}
            `;
        }

        // Event handlers
        function handleVinInput(event) {
            const input = event.target;
            input.value = input.value.toUpperCase();
            
            if (event.key === 'Enter') {
                loadVin();
            }
        }

        // Initialize app with permission check
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await initDatabase();
                updatePhotoCounters();
                addLog('VIN Photo Capture System with QR Scanner ready');
                
                // Check if camera is available
                const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';
                if (!isSecure) {
                    addLog('⚠️ Camera requires HTTPS connection for mobile devices');
                    addLog('💡 For local testing, use: python -m http.server --bind 127.0.0.1 8000');
                    document.getElementById('qr-scan-btn').innerHTML = '🔒 HTTPS Required';
                    document.getElementById('qr-scan-btn').disabled = true;
                } else if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    addLog('⚠️ Camera not supported in this browser');
                    document.getElementById('qr-scan-btn').innerHTML = '❌ Not Supported';
                    document.getElementById('qr-scan-btn').disabled = true;
                } else {
                    addLog('📷 QR scanner available for automatic VIN detection');
                    addLog('💡 QR format: Look for 16 digits after # symbol');
                }
                
                addLog('🔒 All photos stored permanently in browser database');
                addLog('✍️ You can always enter VIN manually if camera is not available');
                
                // Focus VIN input
                setTimeout(() => {
                    document.getElementById('vin-input').focus();
                }, 100);
                
            } catch (error) {
                console.error('Failed to initialize app:', error);
                addLog('⚠️ Failed to initialize database - photos may not persist');
            }
        });

        // Add manual VIN entry help
        function showVinHelp() {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 1rem;
            `;
            modal.innerHTML = `
                <div style="
                    background: #1f2937;
                    border-radius: 0.75rem;
                    padding: 1.5rem;
                    max-width: 350px;
                    color: white;
                ">
                    <div style="font-weight: bold; margin-bottom: 1rem; color: #3b82f6;">📝 Manual VIN Entry</div>
                    
                    <div style="background: #374151; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;">
                        <div style="font-weight: bold; margin-bottom: 0.5rem;">If QR scanner doesn't work:</div>
                        <div style="font-size: 0.875rem; line-height: 1.4;">
                            1. Find the VIN on your vehicle<br>
                            2. Look for a QR code nearby<br>
                            3. In the QR text, find the <strong>#</strong> symbol<br>
                            4. Copy the <strong>16 characters after #</strong><br>
                            5. Type them in the VIN field above
                        </div>
                    </div>
                    
                    <div style="background: #059669; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.75rem;">
                        <strong>Example:</strong> If QR contains "...#MEERBC007S723254..." then VIN is "MEERBC007S723254"
                    </div>
                    
                    <button onclick="this.closest('div').remove();" style="
                        width: 100%;
                        background: #3b82f6;
                        border: none;
                        color: white;
                        padding: 0.75rem;
                        border-radius: 0.5rem;
                        cursor: pointer;
                        font-size: 0.875rem;
                    ">✅ Got it!</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Add help button next to VIN input
        function addVinHelpButton() {
            const vinSection = document.querySelector('.vin-input-section');
            const helpBtn = document.createElement('button');
            helpBtn.innerHTML = '❓';
            helpBtn.className = 'qr-scan-btn';
            helpBtn.style.minWidth = '60px';
            helpBtn.onclick = showVinHelp;
            helpBtn.title = 'Help with manual VIN entry';
            vinSection.appendChild(helpBtn);
        }

        // Call this after DOM is loaded
        setTimeout(addVinHelpButton, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && document.activeElement === document.getElementById('vin-input')) {
                event.preventDefault();
                startPhotoSequence();
            }
            
            if (event.key === 'Escape') {
                if (qrScanner) {
                    stopQRScanner();
                }
                // Close any open modals
                document.querySelectorAll('[style*="position: fixed"]').forEach(modal => {
                    if (modal.style.zIndex === '1000') {
                        modal.remove();
                    }
                });
            }
        });

        // Clean up QR scanner on page unload
        window.addEventListener('beforeunload', function() {
            if (qrScanner) {
                qrScanner.stop().catch(console.error);
            }
        });

        // Prevent zoom on mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Prevent context menu
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });
    </script>
</body>
</html>
